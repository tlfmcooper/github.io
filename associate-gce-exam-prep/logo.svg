<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" fill="none">
  <defs>
    <linearGradient id="cloud-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c3d9ff" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="badge-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#1a73e8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Cloud shape -->
  <g filter="url(#glow)">
    <circle cx="20" cy="42" r="12" fill="url(#cloud-fill)" opacity="0.95"/>
    <circle cx="34" cy="30" r="18" fill="url(#cloud-fill)"/>
    <circle cx="54" cy="34" r="15" fill="url(#cloud-fill)" opacity="0.97"/>
    <circle cx="68" cy="42" r="10" fill="url(#cloud-fill)" opacity="0.92"/>
    <rect x="10" y="41" width="68" height="16" fill="url(#cloud-fill)" rx="1"/>
  </g>

  <!-- ACE badge on cloud -->
  <rect x="24" y="38" width="32" height="16" rx="4" fill="url(#badge-fill)"/>
  <text
    x="40" y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
    font-size="9"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="0.5"
  >ACE</text>

  <!-- Wordmark -->
  <text
    x="96" y="34"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
    font-size="26"
    font-weight="800"
    fill="white"
    letter-spacing="-0.5"
  >GCP Prep</text>

  <!-- Subtitle -->
  <text
    x="97" y="54"
    font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif"
    font-size="11.5"
    font-weight="400"
    fill="rgba(255,255,255,0.78)"
    letter-spacing="1.5"
  >ASSOCIATE CLOUD ENGINEER</text>
</svg>
